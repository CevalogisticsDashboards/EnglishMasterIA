function calcNext(c,r){
  let{interval:i=1,easeFactor:ef=2.5,repetitions:rp=0}=c;
  if(r<3){rp=0;i=1;}else{if(rp===0)i=1;else if(rp===1)i=6;else i=Math.round(i*ef);rp++;}
  const mq=(r-1)*(5/3);ef=Math.max(1.3,ef+0.1-(5-mq)*(0.08+(5-mq)*0.02));
  const d=new Date();d.setDate(d.getDate()+i);
  return{interval:i,easeFactor:Math.round(ef*100)/100,repetitions:rp,dueDate:d.toISOString(),lastReviewed:new Date().toISOString()};
}

const gKey=()=>localStorage.getItem('gemini_api_key')||'';
const yKey=()=>localStorage.getItem('youtube_api_key')||'';
async function callGemini(contents,sys='',max=500){
  const k=gKey();if(!k)throw new Error('⚙️ Chave Gemini não configurada. Acesse Configurações.');
  const body={contents,generationConfig:{maxOutputTokens:max}};
  if(sys)body.systemInstruction={parts:[{text:sys}]};
  const r=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-05-20:generateContent?key=${k}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  const d=await r.json();if(d.error)throw new Error(d.error.message);
  return d.candidates?.[0]?.content?.parts?.[0]?.text||'';
}
const genCard=async w=>{
  const t=await callGemini([{role:'user',parts:[{text:`Flashcard for "${w}". Return ONLY JSON:\n{"word":"${w}","phonetic":"/.../","partOfSpeech":"...","definition":"...","translation_pt":"...","example":"...","example_pt":"...","level":"B1","tip":"..."}`}]}],'',400);
  const m=t.match(/\{[\s\S]*\}/);if(!m)throw new Error('Parse error');return JSON.parse(m[0]);
};
const explainWord=(w,ctx)=>callGemini([{role:'user',parts:[{text:`Explain "${w}"${ctx?` in context: "${ctx}"`:''}. Meaning, 🇧🇷 PT translation, usage tip. Concise.`}]}],'Friendly English tutor for Brazilians.',300);
const chatAI=(hist,msg)=>{
  const c=hist.filter(m=>m.id!==1).map(m=>({role:m.r==='assistant'?'model':'user',parts:[{text:m.c}]}));
  c.push({role:'user',parts:[{text:msg}]});
  return callGemini(c,'You are Max, a friendly English tutor for Brazilians. Be concise and engaging.',600);
};
const searchYT=async q=>{
  const k=yKey();if(!k)return null;
  const r=await fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&q=${encodeURIComponent(q+' english learning')}&type=video&key=${k}&maxResults=5`);
  const d=await r.json();if(d.error)throw new Error(d.error.message);
  return(d.items||[]).map(i=>({id:i.id.videoId,title:i.snippet.title,ch:i.snippet.channelTitle,thumb:i.snippet.thumbnails?.medium?.url}));
};

// ── ThemePill ──
function TPill({sm}){
  const{isDark,toggle}=uT();
  const[w,h,k,off]=[sm?40:46,sm?22:25,sm?16:19,3];
  return <button className="tpill" onClick={toggle} style={{width:w,height:h,background:isDark?'linear-gradient(135deg,#4f46e5,#7c3aed)':'#dde1ef'}}>
    <div className="tknob" style={{width:k,height:k,left:isDark?`calc(100% - ${k+off}px)`:off}}/>
  </button>;
}

function EyeBtn({show,set,T}){return <button onClick={()=>set(v=>!v)} style={{position:'absolute',right:12,top:'50%',transform:'translateY(-50%)',background:'none',border:'none',color:T.t4,cursor:'pointer',padding:4,display:'flex'}}>{show?I.eyo:I.eye}</button>;}

          <h2 style={{fontSize:18,fontWeight:700,marginBottom:6,color:T.t1}}>Bem-vindo de volta 👋</h2>

function Flashcards({cards,setCards,onXP}){
  const{T}=uT();
  const[mode,setMode]=useState('list');
  const[idx,setIdx]=useState(0);const[flip,setFlip]=useState(false);
  const[showAdd,setShowAdd]=useState(false);const[addW,setAddW]=useState('');const[addTab,setAddTab]=useState('ai');
  const[ld,setLd]=useState(false);const[err,setErr]=useState('');
  const[man,setMan]=useState({word:'',definition:'',translation_pt:'',example:''});
  const[sess,setSess]=useState({done:0,ok:0});const[done,setDone]=useState(false);
  const due=useMemo(()=>getDue(cards),[cards]);const cur=due[idx];
  const spk=t=>{if('speechSynthesis'in window){speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(t);u.lang='en-US';u.rate=.85;speechSynthesis.speak(u);}};
  const rate=r=>{
    setCards(p=>p.map(c=>c.id===cur.id?{...c,...calcNext(cur,r)}:c));
    const ns={done:sess.done+1,ok:sess.ok+(r>=3?1:0)};setSess(ns);
    if(r>=3)onXP(r===4?15:r===3?10:5);
    if(idx+1>=due.length)setDone(true);else{setIdx(i=>i+1);setFlip(false);}
  };
  const doGen=async()=>{if(!addW.trim())return;setLd(true);setErr('');try{const d=await genCard(addW.trim());setCards(p=>[...p,{...d,id:uid(),interval:1,easeFactor:2.5,repetitions:0,dueDate:null,lastReviewed:null}]);setAddW('');setShowAdd(false);}catch(e){setErr('Erro: '+e.message);}setLd(false);};
  const doMan=()=>{if(!man.word||!man.definition)return;setCards(p=>[...p,{id:uid(),...man,interval:1,easeFactor:2.5,repetitions:0,dueDate:null,lastReviewed:null}]);setMan({word:'',definition:'',translation_pt:'',example:''});setShowAdd(false);};

  if(mode==='list')return(
    <div className="su" style={{display:'flex',flexDirection:'column',gap:12}}>
      <div style={{display:'grid',gridTemplateColumns:'repeat(2,1fr)',gap:10}}>
        {[['Para Hoje',due.length,'#f59e0b','rgba(245,158,11,.08)','rgba(245,158,11,.2)'],['Total',cards.length,'#4f46e5','rgba(79,70,229,.08)','rgba(79,70,229,.2)'],['Novos',cards.filter(c=>!c.lastReviewed).length,'#7c3aed','rgba(124,58,237,.08)','rgba(124,58,237,.2)'],['Maduros',cards.filter(c=>c.interval>=21).length,'#06d6a0','rgba(6,214,160,.08)','rgba(6,214,160,.2)']].map(([l,v,c,bg,bd])=>(
          <div key={l} style={{background:bg,border:`1px solid ${bd}`,borderRadius:14,padding:'16px',textAlign:'center'}}>
            <div style={{fontSize:26,fontWeight:800,color:c}}>{v}</div><div style={{fontSize:12,color:T.t4,marginTop:2}}>{l}</div>
          </div>
        ))}
      </div>
      <div style={{background:T.g1,border:`1px solid ${T.g2}`,borderRadius:16,padding:16}}>
        <div style={{fontWeight:700,fontSize:15,color:T.t1,marginBottom:4}}>{due.length>0?`${due.length} card${due.length>1?'s':''} para revisão`:'Tudo em dia! 🎉'}</div>
        <div style={{fontSize:13,color:T.t4,marginBottom:12}}>{due.length>0?'Revise agora para fortalecer a memória':'Volte amanhã para a próxima sessão'}</div>
        <div style={{display:'flex',gap:8}}>
          <button className="btn btg" style={{flex:1,justifyContent:'center'}} onClick={()=>setShowAdd(true)}>{I.plus} Adicionar</button>
          {due.length>0&&<button className="btn" style={{flex:1,justifyContent:'center'}} onClick={()=>{setIdx(0);setFlip(false);setSess({done:0,ok:0});setDone(false);setMode('review');}}>Revisar →</button>}
        </div>
      </div>
      <div style={{display:'flex',flexDirection:'column',gap:8}}>
        {cards.map(c=>(
          <div key={c.id} style={{background:T.g1,border:`1px solid ${T.g2}`,borderRadius:12,padding:'13px 16px',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <div style={{minWidth:0,flex:1}}><div style={{fontWeight:700,fontSize:14,color:T.t1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{c.word}</div><div style={{fontSize:12,color:T.t4,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',marginTop:2}}>{c.translation_pt||c.definition}</div></div>
            <div style={{display:'flex',gap:5,marginLeft:10}}>
              {c.level&&<span className="tag" style={{background:T.tb,color:T.tc,border:`1px solid ${T.td}`}}>{c.level}</span>}
              <span className="tag" style={{background:!c.lastReviewed?'rgba(245,158,11,.12)':T.g3,color:!c.lastReviewed?'#f59e0b':T.t4,border:`1px solid ${!c.lastReviewed?'rgba(245,158,11,.2)':T.g4}`}}>{!c.lastReviewed?'Novo':`${c.interval||1}d`}</span>
            </div>
          </div>
        ))}
      </div>
      {showAdd&&(
        <div style={{position:'fixed',inset:0,zIndex:200,display:'flex',alignItems:'flex-end',justifyContent:'center'}} onClick={()=>setShowAdd(false)}>
          <div style={{position:'absolute',inset:0,background:'rgba(0,0,0,.6)',backdropFilter:'blur(4px)'}}/>
          <div className="bi" style={{position:'relative',borderRadius:'22px 22px 0 0',padding:'24px 22px',width:'100%',maxWidth:480,maxHeight:'90vh',overflowY:'auto',background:T.mb,border:`1px solid ${T.g2}`}} onClick={e=>e.stopPropagation()}>
            <div style={{width:36,height:4,borderRadius:2,background:T.g2,margin:'0 auto 20px'}}/>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
              <h3 style={{fontSize:17,fontWeight:700,color:T.t1}}>Adicionar Card</h3>
              <button style={{background:'none',border:'none',color:T.t4,cursor:'pointer',display:'flex'}} onClick={()=>setShowAdd(false)}>{I.x}</button>
            </div>
            <div style={{display:'flex',background:T.g3,borderRadius:12,padding:3,gap:3,marginBottom:16,border:`1px solid ${T.g4}`}}>
              {[['ai','✨ IA'],['manual','✏️ Manual']].map(([t,l])=>(
                <button key={t} onClick={()=>setAddTab(t)} style={{flex:1,padding:'9px',borderRadius:10,border:'none',fontSize:13,fontWeight:700,background:addTab===t?'linear-gradient(135deg,#4f46e5,#7c3aed)':'transparent',color:addTab===t?'#fff':T.t4,fontFamily:'inherit',cursor:'pointer'}}>{l}</button>
              ))}
            </div>
            {addTab==='ai'?(
              <div style={{display:'flex',flexDirection:'column',gap:12}}>
                <p style={{fontSize:13,color:T.t4,lineHeight:1.6}}>Digite uma palavra e a IA cria um card completo com definição, tradução, exemplo e dica.</p>
                <input className="inp" placeholder="Ex: serendipity, give up..." value={addW} onChange={e=>setAddW(e.target.value)} onKeyDown={e=>e.key==='Enter'&&doGen()}/>
                {err&&<p style={{fontSize:12,color:'#f87171',padding:'8px 12px',borderRadius:8,background:'rgba(248,113,113,.08)',border:'1px solid rgba(248,113,113,.2)'}}>{err}</p>}
                <button className="btn" style={{width:'100%',justifyContent:'center',opacity:ld||!addW.trim()?.5:1}} onClick={doGen} disabled={ld||!addW.trim()}>{ld?<>{I.ld} Gerando...</>:'✨ Gerar com Gemini IA'}</button>
              </div>
            ):(
              <div style={{display:'flex',flexDirection:'column',gap:10}}>
                {[['word','Palavra *'],['definition','Definição em inglês *'],['translation_pt','Tradução PT'],['example','Exemplo']].map(([k,l])=>(
                  <div key={k}><label style={{fontSize:12,color:T.t4,display:'block',marginBottom:5,fontWeight:600}}>{l}</label><input className="inp" value={man[k]} onChange={e=>setMan(m=>({...m,[k]:e.target.value}))}/></div>
                ))}
                <button className="btn" style={{width:'100%',justifyContent:'center',opacity:!man.word||!man.definition?.5:1}} onClick={doMan} disabled={!man.word||!man.definition}>Adicionar Card</button>
              </div>
            )}
          </div>
        </div>
      )}
    </div>
  );

  if(done){
    const pct=Math.round((sess.ok/Math.max(sess.done,1))*100);
    return(
      <div className="bi" style={{display:'flex',flexDirection:'column',alignItems:'center',textAlign:'center',gap:18,padding:'40px 20px'}}>
        <div style={{fontSize:60}}>{pct>=80?'🏆':pct>=60?'💪':'📚'}</div>
        <div><h2 style={{fontSize:22,fontWeight:800,color:T.t1}}>Sessão completa!</h2><p style={{color:T.t4,marginTop:4}}>{sess.done} cards revisados</p></div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,width:'100%',maxWidth:260}}>
          <div style={{background:'rgba(6,214,160,.08)',border:'1px solid rgba(6,214,160,.25)',borderRadius:14,padding:16,textAlign:'center'}}><div style={{fontSize:26,fontWeight:800,color:'#06d6a0'}}>{sess.ok}</div><div style={{fontSize:12,color:T.t4}}>Corretos</div></div>
          <div style={{background:'rgba(245,158,11,.08)',border:'1px solid rgba(245,158,11,.25)',borderRadius:14,padding:16,textAlign:'center'}}><div style={{fontSize:26,fontWeight:800,color:'#f59e0b'}}>{pct}%</div><div style={{fontSize:12,color:T.t4}}>Precisão</div></div>
        </div>
        <button className="btn" onClick={()=>setMode('list')}>Voltar ao Início</button>
      </div>
    );
  }
  if(!cur){setMode('list');return null;}
  return(
    <div className="su" style={{display:'flex',flexDirection:'column',gap:16,maxWidth:460,margin:'0 auto',width:'100%'}}>
      <div style={{display:'flex',alignItems:'center',gap:10}}>
        <button className="btn btg" style={{padding:'8px 12px',fontSize:13}} onClick={()=>setMode('list')}>← Voltar</button>

function Videos(){
  const{T,isDark}=uT();
  const[inputQ,setInputQ]=useState('serendipity');
  const[searchQ,setSearchQ]=useState('');
  const[videos,setVideos]=useState([]);
  const[idx,setIdx]=useState(0);
  const[captions,setCaptions]=useState([]);
  const[activeCap,setActiveCap]=useState('');
  const[capHist,setCapHist]=useState([]);
  const[loading,setLoading]=useState(false);
  const[capLoading,setCapLoading]=useState(false);
  const[playerState,setPlayerState]=useState('idle');// idle|loading|playing|paused|ended|error
  const[err,setErr]=useState('');
  const[wordFoundAt,setWordFoundAt]=useState(null);// seconds where word first appears
  const ytRef=useRef(null);
  const syncRef=useRef(null);
  const capsRef=useRef([]);
  const capHistRef=useRef([]);
  const playerReadyRef=useRef(false);
  const navGuardRef=useRef(false);// prevents double-navigation
  const SUGG=['serendipity','nevertheless','procrastinate','give up','come across','look forward to'];

  // ── Load YouTube IFrame API once ──
  useEffect(()=>{
    const loadAPI=()=>{
      if(window.YT&&window.YT.Player){playerReadyRef.current=true;return;}
      const prev=window.onYouTubeIframeAPIReady;
      window.onYouTubeIframeAPIReady=()=>{playerReadyRef.current=true;if(prev)prev();};
      if(!document.querySelector('script[src*="iframe_api"]')){
        const s=document.createElement('script');
        s.src='https://www.youtube.com/iframe_api';
        document.head.appendChild(s);
      }
    };
    loadAPI();
    return()=>{stopSync();destroyPlayer();};
  },[]);

  const destroyPlayer=()=>{
    stopSync();
    if(ytRef.current){try{ytRef.current.destroy();}catch(e){}ytRef.current=null;}
  };

  // ── Create player using youtube-nocookie.com (bypasses embed domain restrictions) ──
  const buildPlayer=(videoId)=>{
    destroyPlayer();
    const container=document.getElementById('yt-player-container');
    if(!container)return;
    container.innerHTML='';
    const div=document.createElement('div');
    div.id='yt-inner-player';
    container.appendChild(div);
    setPlayerState('loading');
    const create=()=>{
      ytRef.current=new window.YT.Player('yt-inner-player',{
        // KEY FIX: youtube-nocookie.com has no embedding domain restrictions
        host:'https://www.youtube-nocookie.com',
        videoId,
        width:'100%',height:'100%',
        playerVars:{
          autoplay:1,
          cc_load_policy:1,  // force captions on
          cc_lang_pref:'en',
          modestbranding:1,
          rel:0,
          iv_load_policy:3,
          playsinline:1,
          fs:1,
          // Do NOT set origin for file:// compatibility
        },
        events:{
          onReady:(e)=>{e.target.playVideo();setPlayerState('playing');},
          onError:(e)=>{setPlayerState('error');stopSync();},
          onStateChange:(e)=>{
            if(!window.YT?.PlayerState)return;
            const S=window.YT.PlayerState;
            if(e.data===S.PLAYING){setPlayerState('playing');startSync();}
            else if(e.data===S.PAUSED){setPlayerState('paused');stopSync();}
            else if(e.data===S.BUFFERING){setPlayerState('loading');}
            else if(e.data===S.ENDED){setPlayerState('ended');stopSync();}
          }
        }
      });
    };
    if(window.YT&&window.YT.Player){create();}
    else{
      const wait=setInterval(()=>{if(window.YT&&window.YT.Player){clearInterval(wait);create();}},100);
    }
  };

  const startSync=()=>{
    stopSync();
    syncRef.current=setInterval(()=>{
      try{
        if(!ytRef.current?.getCurrentTime)return;
        const t=ytRef.current.getCurrentTime();
        const cap=capsRef.current.find(c=>t>=c.s&&t<c.s+c.d+0.3);
        const txt=cap?.t||'';
        setActiveCap(prev=>{
          if(txt!==prev&&txt){
            capHistRef.current=[...capHistRef.current.slice(-2),txt];
            setCapHist([...capHistRef.current]);
          }
          return txt;
        });
      }catch(e){}
    },250);
  };
  const stopSync=()=>{if(syncRef.current){clearInterval(syncRef.current);syncRef.current=null;}};

  const switchVideo=(newIdx)=>{
    if(navGuardRef.current)return;
    navGuardRef.current=true;
    setTimeout(()=>{navGuardRef.current=false;},800);
    stopSync();
    setCaptions([]);setActiveCap('');setCapHist([]);
    capsRef.current=[];capHistRef.current=[];
    setPlayerState('loading');setWordFoundAt(null);
    setIdx(newIdx);
  };

  // ── When idx changes, load new video into existing player ──
  useEffect(()=>{
    if(!videos.length)return;
    const v=videos[idx];if(!v)return;
    if(ytRef.current&&typeof ytRef.current.loadVideoById==='function'){
      ytRef.current.loadVideoById(v.id);
    }else{
      // player not ready yet, buildPlayer will handle it
    }
    fetchCaptions(v.id,searchQ);
  },[idx]);// eslint-disable-line

  const seekToWord=useCallback((caps,word)=>{
    if(!caps.length||!word)return;
    const re=new RegExp(word.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'i');
    const hit=caps.find(cap=>re.test(cap.t));
    if(hit){
      const seekT=Math.max(0,hit.s-10);
      setWordFoundAt(hit.s);
      try{if(ytRef.current?.seekTo){ytRef.current.seekTo(seekT,true);}}catch(e){}
    }else{
      setWordFoundAt(-1);// word not found in captions
    }
  },[]);

  const parseCaptions=(evts)=>{
    if(!evts||!evts.length)return null;
    const parsed=evts
      .filter(ev=>ev.segs&&ev.tStartMs!=null)
      .map(ev=>({
        s:ev.tStartMs/1000,
        d:(ev.dDurationMs||3000)/1000,
        t:ev.segs.map(s=>(s.utf8||'').replace(/\n/g,' ').replace(/\u200b/g,'')).join('').trim()
      }))
      .filter(ev=>ev.t.length>1);
    return parsed.length>3?parsed:null;
  };

  const fetchCaptions=async(videoId,word)=>{
    setCapLoading(true);setCaptions([]);setWordFoundAt(null);
    capsRef.current=[];capHistRef.current=[];
    setActiveCap('');setCapHist([]);

    const PROXIES=[
      u=>`https://corsproxy.io/?${encodeURIComponent(u)}`,
      u=>`https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`,
      u=>`https://corsproxy.org/?${encodeURIComponent(u)}`,
      u=>`https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(u)}`,
    ];
    const URLS=[
      `https://www.youtube.com/api/timedtext?v=${videoId}&lang=en&fmt=json3`,
      `https://www.youtube.com/api/timedtext?v=${videoId}&lang=en&kind=asr&fmt=json3`,
      `https://www.youtube.com/api/timedtext?v=${videoId}&lang=en-US&fmt=json3`,
      `https://www.youtube.com/api/timedtext?v=${videoId}&lang=en-GB&fmt=json3`,
      `https://www.youtube.com/api/timedtext?v=${videoId}&tlang=en&fmt=json3`,
    ];

    for(const ytUrl of URLS){
      for(const mkProxy of PROXIES){
        const proxyUrl=mkProxy(ytUrl);
        try{
          const ctrl=new AbortController();
          const tid=setTimeout(()=>ctrl.abort(),7000);
          const r=await fetch(proxyUrl,{signal:ctrl.signal});
          clearTimeout(tid);
          if(!r.ok)continue;
          const txt=await r.text();
          if(!txt||txt.length<30)continue;
          // strip potential JSONP wrapper or BOM
          const clean=txt.trim().replace(/^[^{\[]+/,'').replace(/[^}\]]+$/,'');
          let d;
          try{d=JSON.parse(clean);}catch{try{d=JSON.parse(txt);}catch{continue;}}
          const parsed=parseCaptions(d?.events);
          if(parsed){
            capsRef.current=parsed;
            setCaptions(parsed);
            setCapLoading(false);
            // Seek player to 10s before first occurrence of the word
            if(word){
              // Wait a moment for player to be in playing state
              setTimeout(()=>seekToWord(parsed,word),800);
            }
            return;
          }
        }catch(e){if(e.name==='AbortError')continue;continue;}
      }
    }
    setCapLoading(false);
  };

  const doSearch=async(q=inputQ)=>{
    const trimQ=(q||'').trim();if(!trimQ)return;
    destroyPlayer();
    setSearchQ(trimQ);setLoading(true);setErr('');
    setVideos([]);setIdx(0);setCaptions([]);setActiveCap('');setCapHist([]);
    capsRef.current=[];capHistRef.current=[];setPlayerState('idle');setWordFoundAt(null);
    const k=yKey();
    let vids=[];
    if(k){
      try{
        // Search targeting channels known to allow embedding + educational content
        // Using channelId filter for TED (UCsooa4yRKGN_zEE8iknghZA) and broader educational
        const queries=[
          // Primary: educational english channels
          `${trimQ} english lesson site:youtube.com`,
          `${trimQ} english`,
        ];
        const sUrl=`https://www.googleapis.com/youtube/v3/search`+
          `?part=snippet`+
          `&q=${encodeURIComponent(trimQ+' english')}`+
          `&type=video`+
          `&videoEmbeddable=true`+
          `&videoDimension=2d`+
          `&key=${k}`+
          `&maxResults=30`+// fetch more so filtering still leaves enough
          `&relevanceLanguage=en`+
          `&safeSearch=none`;
        const sRes=await fetch(sUrl);
        const sData=await sRes.json();
        if(sData.error)throw new Error(sData.error.message||'Erro na YouTube API');
        const rawIds=(sData.items||[]).map(i=>i.id.videoId).filter(Boolean);
        if(!rawIds.length)throw new Error(`Nenhum vídeo encontrado para "${trimQ}"`);

        // ── STEP 2: videos.list to confirm status.embeddable === true ──
        const vUrl=`https://www.googleapis.com/youtube/v3/videos`+
          `?part=status,snippet,contentDetails`+
          `&id=${rawIds.join(',')}`+
          `&key=${k}`;
        const vRes=await fetch(vUrl);
        const vData=await vRes.json();
        if(vData.error)throw new Error(vData.error.message);

        const snippetMap={};
        (sData.items||[]).forEach(i=>{snippetMap[i.id.videoId]=i.snippet;});

        vids=(vData.items||[])
          .filter(v=>{
            // Only keep videos confirmed embeddable
            if(!v.status?.embeddable)return false;
            // Skip YouTube Movies / paid content
            if(v.contentDetails?.contentRating&&Object.keys(v.contentDetails.contentRating).length>0)return false;
            return true;
          })
          .map(v=>{
            const sn=snippetMap[v.id]||v.snippet;
            return{id:v.id,title:sn.title,ch:sn.channelTitle,thumb:sn.thumbnails?.medium?.url||sn.thumbnails?.default?.url};
          });

        if(!vids.length)throw new Error(`Todos os vídeos bloqueiam embed para "${trimQ}". Tente outra palavra.`);

      }catch(e){setErr(e.message);setLoading(false);return;}
    }else{
      // Curated list — TED + Oxford Online English confirmed embeddable via nocookie
      vids=[
        {id:'arj7oStGLkU',title:'The Power of Introverts — Susan Cain (TED)',ch:'TED'},
        {id:'BkpBMGFmLZ8',title:'The surprising pattern behind all great discoveries',ch:'TED'},
        {id:'_ZBKX-6Gz6A',title:'How to speak so that people want to listen',ch:'TED'},
        {id:'iG9CE55wbtY',title:'Inside the mind of a master procrastinator',ch:'TED'},
        {id:'8jPQjjsBbIc',title:'How language shapes the way we think',ch:'TED'},
        {id:'g-tqzDLBLOM',title:'Talking about the future in English',ch:'Oxford Online English'},
        {id:'v1CmGbOGb2I',title:'Advanced English Vocabulary Lesson',ch:'Oxford Online English'},
      ];
    }
    setVideos(vids);
    setLoading(false);
    setTimeout(()=>{
      if(vids.length){buildPlayer(vids[0].id);fetchCaptions(vids[0].id,trimQ);}
    },200);
  };

  const hlWord=(text,q)=>{
    if(!q||!text)return text;
    const re=new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi');
    return text.split(re).map((p,i)=>
      p.toLowerCase()===q.toLowerCase()
        ?<mark key={i} style={{background:'rgba(245,158,11,.45)',color:isDark?'#fbbf24':'#92400e',borderRadius:4,padding:'1px 5px',fontWeight:800,fontSize:'inherit'}}>{p}</mark>
        :p
    );
  };

  const cur=videos[idx];
  const navTo=(dir)=>{
    const newIdx=(idx+dir+videos.length)%videos.length;
    switchVideo(newIdx);
  };
  const stateIcon={idle:'',loading:'⏳',playing:'▶',paused:'⏸',ended:'✔',error:'⚠️'};

  // ── SEARCH SCREEN ──
  if(!searchQ){
    return(
      <div className="su" style={{display:'flex',flexDirection:'column',gap:16}}>
        <div style={{textAlign:'center',padding:'8px 0 4px'}}>
          <div style={{fontSize:32,marginBottom:8}}>▶️</div>
          <h2 style={{fontSize:18,fontWeight:800,color:T.t1,marginBottom:4}}>Vídeos no Contexto</h2>
          <p style={{fontSize:13,color:T.t4,lineHeight:1.5}}>Veja palavras sendo usadas em vídeos reais do YouTube — igual ao YouGlish. Legendas sincronizadas automáticas.</p>
        </div>
        <div style={{display:'flex',gap:8}}>
          <input className="inp" style={{flex:1,fontSize:16}} placeholder='Digite uma palavra...' value={inputQ} onChange={e=>setInputQ(e.target.value)} onKeyDown={e=>e.key==='Enter'&&doSearch()}/>
          <button className="btn" style={{flexShrink:0,padding:'11px 18px'}} onClick={()=>doSearch()} disabled={loading}>{loading?I.ld:<>▶ Buscar</>}</button>
        </div>
        <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
          {SUGG.map(s=><button key={s} onClick={()=>{setInputQ(s);doSearch(s);}} style={{fontSize:12,padding:'6px 14px',borderRadius:20,background:T.g3,border:`1px solid ${T.g4}`,color:T.t3,cursor:'pointer',fontFamily:'inherit'}} onMouseOver={e=>e.currentTarget.style.borderColor='rgba(79,70,229,.4)'} onMouseOut={e=>e.currentTarget.style.borderColor=T.g4}>{s}</button>)}
        </div>
        {!yKey()&&<div style={{padding:'12px 14px',borderRadius:12,background:'rgba(245,158,11,.07)',border:'1px solid rgba(245,158,11,.2)'}}>
          <p style={{fontSize:12,color:'#92400e',lineHeight:1.5}}>⚠️ Configure a <strong>YouTube Data API v3 Key</strong> nas Configurações para busca ao vivo. No modo demo, vídeos educativos de exemplo serão usados.</p>
        </div>}
      </div>
    );
  }

  // ── PLAYER SCREEN ──
  return(
    <div className="su" style={{display:'flex',flexDirection:'column',gap:12}}>
      {/* Search bar compacta */}
      <div style={{display:'flex',gap:8,alignItems:'center'}}>
        <button className="btn btg" style={{padding:'8px 10px',fontSize:13,flexShrink:0}} onClick={()=>{setSearchQ('');setVideos([]);destroyPlayer();setPlayerState('idle');}}>← Buscar</button>
        <input className="inp" style={{flex:1,padding:'9px 14px'}} value={inputQ} onChange={e=>setInputQ(e.target.value)} onKeyDown={e=>e.key==='Enter'&&doSearch()} placeholder="Nova busca..."/>
        <button className="btn" style={{flexShrink:0,padding:'9px 12px'}} onClick={()=>doSearch()} disabled={loading}>{loading?I.ld:I.play}</button>
      </div>

      {err&&<p style={{fontSize:12,color:'#f87171',padding:'8px 12px',borderRadius:8,background:'rgba(248,113,113,.08)',border:'1px solid rgba(248,113,113,.2)'}}>{err}</p>}

      {/* Barra de navegação */}
      {videos.length>0&&(
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'8px 12px',borderRadius:12,background:T.g3,border:`1px solid ${T.g4}`}}>
          <button onClick={()=>navTo(-1)} style={{display:'flex',alignItems:'center',gap:5,padding:'7px 13px',borderRadius:10,border:`1px solid ${T.g2}`,background:'none',color:T.t3,fontFamily:'inherit',cursor:'pointer',fontSize:13,fontWeight:600,transition:'all .15s'}} onMouseOver={e=>e.currentTarget.style.background=T.g1} onMouseOut={e=>e.currentTarget.style.background='none'}>
            <svg width="14"height="14"fill="none"stroke="currentColor"strokeWidth="2.5"viewBox="0 0 24 24"><polyline points="15,18 9,12 15,6"/></svg> Anterior
          </button>
          <div style={{textAlign:'center'}}>
            <div style={{fontSize:13,fontWeight:700,color:T.t1}}>{idx+1} <span style={{color:T.t5}}>de</span> {videos.length}</div>
            <div style={{fontSize:10,color:T.t5,marginTop:1}}>"{searchQ}"</div>
          </div>
          <button onClick={()=>navTo(1)} style={{display:'flex',alignItems:'center',gap:5,padding:'7px 13px',borderRadius:10,border:`1px solid ${T.g2}`,background:'none',color:T.t3,fontFamily:'inherit',cursor:'pointer',fontSize:13,fontWeight:600,transition:'all .15s'}} onMouseOver={e=>e.currentTarget.style.background=T.g1} onMouseOut={e=>e.currentTarget.style.background='none'}>
            Próximo <svg width="14"height="14"fill="none"stroke="currentColor"strokeWidth="2.5"viewBox="0 0 24 24"><polyline points="9,18 15,12 9,6"/></svg>
          </button>
        </div>
      )}

      {/* Player container — usa ID estável para o YT API */}
      <div style={{position:'relative',paddingTop:'56.25%',background:'#000',borderRadius:14,overflow:'hidden',border:`1px solid ${T.g2}`,boxShadow:'0 8px 32px rgba(0,0,0,.45)'}}>
        {/* overlay de status */}
        {(playerState==='loading'||playerState==='idle')&&(
          <div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',background:'rgba(0,0,0,.7)',zIndex:2}}>
            <div style={{color:'#fff',display:'flex',flexDirection:'column',alignItems:'center',gap:10}}>
              {I.ld}<span style={{fontSize:13,color:'rgba(255,255,255,.7)'}}>Carregando player...</span>
            </div>
          </div>
        )}
        {playerState==='error'&&(
          <div style={{position:'absolute',inset:0,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',background:'rgba(0,0,0,.85)',zIndex:2,gap:12,padding:20}}>
            <span style={{fontSize:32}}>⚠️</span>
            <p style={{color:'#f1f5f9',fontSize:14,fontWeight:600,textAlign:'center'}}>Este vídeo não permite reprodução incorporada</p>
            <p style={{color:'#64748b',fontSize:12,textAlign:'center'}}>Tente o próximo ou anterior</p>
            <div style={{display:'flex',gap:10}}>
              <button className="btn btg" style={{padding:'8px 14px',fontSize:13}} onClick={()=>navTo(-1)}>← Anterior</button>
              <button className="btn" style={{padding:'8px 14px',fontSize:13}} onClick={()=>navTo(1)}>Próximo →</button>
            </div>
          </div>
        )}
        {playerState==='ended'&&(
          <div style={{position:'absolute',inset:0,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',background:'rgba(0,0,0,.75)',zIndex:2,gap:12}}>
            <span style={{fontSize:32}}>✅</span>
            <p style={{color:'#f1f5f9',fontSize:14,fontWeight:600}}>Vídeo concluído</p>
            <button className="btn" style={{padding:'9px 18px',fontSize:13}} onClick={()=>navTo(1)}>Próximo vídeo →</button>
          </div>
        )}
        {/* O div com ID que o YT API usa — nunca é removido/recriado pelo React */}
        <div id="yt-player-container" style={{position:'absolute',inset:0,width:'100%',height:'100%'}}/>
      </div>

      {/* Info do vídeo */}
      {cur&&(
        <div style={{padding:'10px 14px',borderRadius:12,background:T.g1,border:`1px solid ${T.g2}`,display:'flex',alignItems:'flex-start',gap:10}}>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontWeight:600,fontSize:13,color:T.t1,lineHeight:1.4,overflow:'hidden',display:'-webkit-box',WebkitLineClamp:2,WebkitBoxOrient:'vertical'}}>{cur.title}</div>
            <div style={{fontSize:11,color:T.t4,marginTop:3}}>📺 {cur.ch}</div>
          </div>
          {playerState==='playing'&&<div style={{width:8,height:8,borderRadius:'50%',background:'#06d6a0',flexShrink:0,marginTop:6,boxShadow:'0 0 6px #06d6a0',animation:'pu 1.5s ease-in-out infinite'}}/>}
        </div>
      )}

      {/* Legendas */}
      <div style={{borderRadius:14,overflow:'hidden',background:T.g3,border:`1px solid ${T.g4}`}}>
        <div style={{padding:'10px 14px',borderBottom:`1px solid ${T.g4}`,display:'flex',alignItems:'center',gap:8,flexWrap:'wrap'}}>
          <div style={{width:7,height:7,borderRadius:'50%',background:activeCap?'#06d6a0':'#374151',transition:'background .3s',boxShadow:activeCap?'0 0 8px #06d6a0':'none',flexShrink:0}}/>
          <span style={{fontSize:11,fontWeight:700,color:T.t4,textTransform:'uppercase',letterSpacing:'.06em'}}>Legendas ao vivo</span>
          {capLoading&&<span style={{marginLeft:'auto',fontSize:11,color:T.t5,display:'flex',alignItems:'center',gap:4}}>{I.ld} buscando...</span>}
          {!capLoading&&captions.length>0&&wordFoundAt>0&&(
            <span style={{marginLeft:'auto',fontSize:11,color:'#4ade80',display:'flex',alignItems:'center',gap:4}}>
              ⏩ Palavra em {Math.floor(wordFoundAt/60)}:{String(Math.floor(wordFoundAt%60)).padStart(2,'0')}
            </span>
          )}
          {!capLoading&&captions.length>0&&wordFoundAt===null&&<span style={{marginLeft:'auto',fontSize:10,color:T.t5,background:T.g4,padding:'2px 7px',borderRadius:20}}>✓ {captions.length} seg.</span>}
          {!capLoading&&captions.length>0&&wordFoundAt===-1&&<span style={{marginLeft:'auto',fontSize:10,color:'#f59e0b'}}>⚠ Palavra não encontrada</span>}
          {!capLoading&&captions.length===0&&<span style={{marginLeft:'auto',fontSize:10,color:'#f87171'}}>indisponíveis neste vídeo</span>}
        </div>
        <div style={{padding:'14px 16px',minHeight:88,display:'flex',flexDirection:'column',justifyContent:'center',gap:6}}>
          {capHist.length>1&&(
            <p style={{fontSize:13,color:T.t5,lineHeight:1.7,opacity:.5,borderLeft:'2px solid '+T.g4,paddingLeft:10}}>{hlWord(capHist[capHist.length-2],searchQ)}</p>
          )}
          {activeCap?(
            <p style={{fontSize:17,color:T.t1,lineHeight:1.75,fontWeight:500,borderLeft:'3px solid #4f46e5',paddingLeft:12}}>{hlWord(activeCap,searchQ)}</p>
          ):(
            <p style={{fontSize:13,color:T.t5,fontStyle:'italic',textAlign:'center',paddingTop:4,lineHeight:1.6}}>
              {capLoading?'Buscando legendas…':
               captions.length>0?'⏳ Aguardando a fala…':
               playerState==='error'?'—':
               <span>Legendas não disponíveis via API neste vídeo.<br/><span style={{fontSize:11,color:T.t6}}>Tente o próximo →</span></span>}
            </p>
          )}
        </div>
      </div>

      {/* Sugestões */}
      <div>
        <p style={{fontSize:11,color:T.t5,marginBottom:8,fontWeight:600,textTransform:'uppercase',letterSpacing:'.05em'}}>Outras buscas</p>
        <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
          {SUGG.filter(s=>s!==searchQ).map(s=><button key={s} onClick={()=>{setInputQ(s);doSearch(s);}} style={{fontSize:12,padding:'5px 12px',borderRadius:20,background:T.bdb,border:`1px solid ${T.bdd}`,color:T.bdc,cursor:'pointer',fontFamily:'inherit'}}>{s}</button>)}
        </div>
      </div>
    </div>
  );
}

        </div>
        <div><div style={{fontWeight:800,fontSize:15,color:T.t1}}>Max — Tutor de Inglês</div><div style={{fontSize:11,color:'#06d6a0'}}>Online · Gemini 2.5 Flash</div></div>
      </div>
      <div className="sa" style={{flex:1,display:'flex',flexDirection:'column',gap:12,paddingBottom:8,minHeight:0}}>
        {msgs.map(msg=>(
          <div key={msg.id} style={{display:'flex',gap:8,flexDirection:msg.r==='user'?'row-reverse':'row',alignItems:'flex-end'}}>
            <div style={{width:30,height:30,borderRadius:10,background:msg.r==='assistant'?'linear-gradient(135deg,#4f46e5,#7c3aed)':T.g3,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,fontSize:14,border:`1px solid ${T.g4}`}}>{msg.r==='assistant'?'🤖':'👤'}</div>
            <div style={{maxWidth:'80%',borderRadius:msg.r==='user'?'16px 4px 16px 16px':'4px 16px 16px 16px',padding:'11px 14px',fontSize:13,lineHeight:1.75,background:msg.r==='user'?T.mub:T.mab,border:`1px solid ${msg.r==='user'?T.mud:T.mad}`,color:T.t2}} dangerouslySetInnerHTML={{__html:fmt(msg.c)}}/>
          </div>
        ))}
        {ld&&<div style={{display:'flex',gap:8,alignItems:'flex-end'}}>
          <div style={{width:30,height:30,borderRadius:10,background:'linear-gradient(135deg,#4f46e5,#7c3aed)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:14}}>🤖</div>
          <div style={{background:T.mab,border:`1px solid ${T.mad}`,borderRadius:'4px 16px 16px 16px',padding:'13px 16px',display:'flex',gap:5}}>
            {[0,150,300].map(d=><div key={d} style={{width:7,height:7,borderRadius:'50%',background:'#4f46e5',animation:'pu 1.2s ease-in-out infinite',animationDelay:`${d}ms`}}/>)}
          </div>
        </div>}
        <div ref={bot}/>
      </div>
      {msgs.length<=2&&(
        <div style={{flexShrink:0,paddingTop:8,borderTop:`1px solid ${T.g4}`,marginBottom:8}}>
          <div style={{display:'flex',flexDirection:'column',gap:6}}>
            {starters.map((s,i)=><button key={i} onClick={()=>send(s)} style={{fontSize:13,padding:'10px 14px',borderRadius:12,background:T.g3,border:`1px solid ${T.g4}`,color:T.t3,textAlign:'left',lineHeight:1.4,fontFamily:'inherit',cursor:'pointer'}} onMouseOver={e=>e.currentTarget.style.borderColor='rgba(79,70,229,.3)'} onMouseOut={e=>e.currentTarget.style.borderColor=T.g4}>{s}</button>)}
          </div>
        </div>
      )}
      <div style={{flexShrink:0,display:'flex',gap:8,paddingTop:10,borderTop:`1px solid ${T.g4}`}}>
        <input className="inp" style={{flex:1}} placeholder="Pergunte qualquer coisa sobre inglês..." value={inp} onChange={e=>setInp(e.target.value)} onKeyDown={e=>e.key==='Enter'&&!ld&&send()} disabled={ld}/>
        <button onClick={()=>send()} disabled={ld||!inp.trim()} style={{padding:'12px 15px',borderRadius:12,border:'none',background:ld||!inp.trim()?'rgba(79,70,229,.28)':'linear-gradient(135deg,#4f46e5,#7c3aed)',color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,transition:'all .18s',cursor:ld||!inp.trim()?'not-allowed':'pointer'}}>
          {ld?I.ld:I.send}
        </button>
      </div>
    </div>
  );
}

// ==================================
// APP PRINCIPAL
// ==================================
function App(){
  const[isDark,setIsDark]=useState(()=>localStorage.getItem('em_theme')!=='light');
  const T=isDark?DK:LT;
  const toggle=useCallback(()=>{setIsDark(d=>{const n=!d;localStorage.setItem('em_theme',n?'dark':'light');document.body.className=n?'':'light';return n;});},[]);
  useEffect(()=>{document.body.className=isDark?'':'light';},[isDark]);

  const[user,setUser]=useState(()=>localStorage.getItem('em_user')||null);
  const[tab,setTab]=useState('home');const[cards,setCards]=useState(DECK);
  const[stats,setStats]=useState({xp:0,level:1,streak:3});const[xpPop,setXpPop]=useState([]);
  const[showSb,setShowSb]=useState(false);const[showSt,setShowSt]=useState(false);const[showTu,setShowTu]=useState(false);

  const addXP=useCallback(n=>{
    const id=Date.now();setXpPop(p=>[...p,{id,n}]);setTimeout(()=>setXpPop(p=>p.filter(x=>x.id!==id)),1400);
    setStats(s=>{const nx=s.xp+n;return{...s,xp:nx,level:Math.floor(nx/100)+1};});
  },[]);
  const logout=()=>{localStorage.removeItem('em_user');setUser(null);setTab('home');setStats({xp:0,level:1,streak:3});};

  const NAV=[{id:'home',ic:'home',lb:'Home'},{id:'flashcards',ic:'cards',lb:'Cards'},{id:'exercises',ic:'brain',lb:'Prática'},{id:'reading',ic:'book',lb:'Leitura'},{id:'videos',ic:'video',lb:'Vídeos'},{id:'tutor',ic:'chat',lb:'Tutor IA'}];
  const TITLES={flashcards:'Flashcards',exercises:'Exercícios',reading:'Reading',videos:'Vídeos',tutor:'Tutor IA'};

  return(
    <TC.Provider value={{T,isDark,toggle}}>
      {!user?(
        <Login onLogin={name=>{localStorage.setItem('em_user',name);setUser(name);}}/>
      ):(
        <div style={{display:'flex',flexDirection:'column',height:'100vh',background:T.bg,backgroundImage:T.bgGrad}}>
          {/* Header */}
          <div style={{flexShrink:0,background:T.hb,backdropFilter:'blur(14px)',borderBottom:`1px solid ${T.g2}`,padding:'10px 14px',display:'flex',justifyContent:'space-between',alignItems:'center',zIndex:50}}>
            <div style={{display:'flex',alignItems:'center',gap:10}}>
              <button onClick={()=>setShowSb(true)} style={{background:T.g3,border:`1px solid ${T.g4}`,borderRadius:10,padding:'7px',color:T.t4,display:'flex',cursor:'pointer'}}>{I.menu}</button>
              <div style={{display:'flex',alignItems:'center',gap:8}}>
                <div style={{width:28,height:28,borderRadius:9,background:'linear-gradient(135deg,#4f46e5,#7c3aed)',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:800,fontSize:14,color:'#fff'}}>E</div>
                <span style={{fontWeight:800,fontSize:15,color:T.t1}}>English<span style={{color:'#818cf8'}}>Master</span></span>
              </div>
            </div>
            <div style={{display:'flex',alignItems:'center',gap:6}}>
              <div style={{display:'flex',alignItems:'center',gap:4,padding:'5px 10px',borderRadius:8,background:T.g3,border:`1px solid ${T.g4}`,fontSize:12}}>🔥<span style={{fontWeight:700,color:T.t1}}>{stats.streak}</span></div>
              <div style={{display:'flex',alignItems:'center',gap:4,padding:'5px 10px',borderRadius:8,background:'rgba(245,158,11,.08)',border:'1px solid rgba(245,158,11,.2)',fontSize:12}}>⚡<span style={{fontWeight:700,color:'#f59e0b'}}>{stats.xp}</span></div>
            </div>
          </div>
          {/* XP Pop */}
          <div style={{position:'fixed',top:58,right:14,zIndex:999,pointerEvents:'none'}}>
            {xpPop.map(f=><div key={f.id} style={{color:'#f59e0b',fontWeight:800,fontSize:13,animation:'sU .5s ease-out forwards',background:'rgba(245,158,11,.12)',border:'1px solid rgba(245,158,11,.2)',padding:'3px 10px',borderRadius:20,marginBottom:4}}>+{f.n} XP ⚡</div>)}
          </div>
          {/* Sidebar */}
          {showSb&&<Sidebar user={user} stats={{...stats,cards:cards.length,mature:cards.filter(c=>c.interval>=21).length}} onClose={()=>setShowSb(false)} onSettings={()=>setShowSt(true)} onTutorial={()=>setShowTu(true)} onLogout={logout}/>}
          {showSt&&<Settings onClose={()=>setShowSt(false)}/>}
          {showTu&&<Tutorial onClose={()=>setShowTu(false)} onSettings={()=>setShowSt(true)}/>}
          {/* Content */}
          <div className="sa" style={{flex:1,padding:'14px 14px 82px',display:'flex',flexDirection:'column'}}>
            {tab!=='home'&&<h1 style={{fontSize:20,fontWeight:800,marginBottom:16,color:T.t1,letterSpacing:'-.02em'}}>{TITLES[tab]}</h1>}
            {tab==='home'&&<Dashboard stats={stats} cards={cards} setTab={setTab}/>}
            {tab==='flashcards'&&<Flashcards cards={cards} setCards={setCards} onXP={addXP}/>}
            {tab==='exercises'&&<Exercises stats={stats} onXP={addXP}/>}
            {tab==='reading'&&<Reading/>}
            {tab==='videos'&&<Videos/>}
            {tab==='tutor'&&<Tutor onXP={addXP}/>}
          </div>
          {/* Bottom Nav */}
          <div style={{position:'fixed',bottom:0,left:0,right:0,background:T.nb,backdropFilter:'blur(16px)',borderTop:`1px solid ${T.g2}`,display:'flex',zIndex:100}}>
            {NAV.map(({id,ic,lb})=>{
              const act=tab===id;
              return(
                <button key={id} onClick={()=>setTab(id)} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:3,padding:'10px 4px 14px',background:'none',border:'none',color:act?T.na:T.ni,transition:'all .18s',fontSize:9,fontWeight:act?700:500,letterSpacing:'.02em',textTransform:'uppercase',cursor:'pointer',position:'relative',fontFamily:'inherit'}}>
                  <span style={{color:act?T.na:T.ni}}>{I[ic]}</span>
                  <span style={{marginTop:1}}>{lb}</span>
                  {act&&<div style={{position:'absolute',bottom:0,width:24,height:2,background:'linear-gradient(90deg,#4f46e5,#7c3aed)',borderRadius:2}}/>}
                </button>
              );
            })}
          </div>
        </div>
      )}
    </TC.Provider>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
